<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wonder Gamezone - Master Administration System</title>
    <style>
        /* --- Core Reset Framework --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0d0d0d;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .dashboard-wrapper {
            width: 100%;
            max-width: 1300px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* --- Global Header Space --- */
        .header-panel {
            background: linear-gradient(135deg, #1f1f1f 0%, #141414 100%);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 40px;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .logo-placeholder {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #ff6a00, #ee0979);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 0 15px rgba(238, 9, 121, 0.4);
        }

        .header-title {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(to right, #ff7b00, #ffae00, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- Primary Action System Buttons --- */
        .log-trigger-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 24px;
            border-radius: 30px;
            color: #fff;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .log-trigger-btn:hover {
            background: #ff9100;
            border-color: #ff9100;
            box-shadow: 0 0 15px rgba(255, 145, 0, 0.4);
        }

        /* --- Workspace Configurations --- */
        .main-content {
            background: linear-gradient(135deg, #1a1a1a 0%, #111111 100%);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 40px;
            padding: 40px;
            display: grid;
            grid-template-columns: 2.2fr 1fr;
            gap: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
            position: relative;
        }

        .stations-side {
            z-index: 2;
            display: flex;
            flex-direction: column;
            gap: 35px;
        }

        .section-title {
            font-size: 0.95rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ffffff;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .section-title::after {
            content: "";
            flex-grow: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.15);
        }

        .stations-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 20px;
        }

        /* --- Interactive System Cards --- */
        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.2s ease, border 0.2s ease;
        }

        .card:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(255, 153, 0, 0.4);
        }

        .card-number {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(180deg, #ff9100 0%, #e25c00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card-status {
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #888;
        }

        .card-timer {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            transition: color 0.3s ease;
        }

        /* --- Adaptive Time Color States --- */
        .timer-safe { color: #00ff66; text-shadow: 0 0 10px rgba(0, 255, 102, 0.2); }
        .timer-warning { color: #ffae00; text-shadow: 0 0 10px rgba(255, 174, 0, 0.2); }
        .timer-critical { color: #ff3333; text-shadow: 0 0 15px rgba(255, 51, 51, 0.5); animation: blinker 1s linear infinite; }

        @keyframes blinker { 50% { opacity: 0.4; } }

        /* --- Right-hand Panel Layout --- */
        .members-side { z-index: 2; }
        .members-panel {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(16px);
             border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            padding: 25px;
            height: 100%;
        }

        .members-title {
            text-align: center;
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 3px;
            color: #ffffff;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        .members-list { list-style: none; display: flex; flex-direction: column; gap: 12px; }
        .member-item {
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding-bottom: 4px;
            background: linear-gradient(to right, #ff6a00, #ffb300);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        }

        /* --- Modal Layout Layering Configuration --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 999;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-container {
            background: #161616;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            width: 90%;
            max-width: 550px;
            padding: 30px;
            max-height: 90vh;
            overflow-y: auto;
            transform: translateY(-20px);
            transition: transform 0.2s ease;
        }

        .modal-overlay.active .modal-container { transform: translateY(0); }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 10px;
        }

        .modal-header h2 {
            font-size: 1.3rem;
            font-weight: 800;
            text-transform: uppercase;
            background: linear-gradient(to right, #ff9100, #ffea00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .close-btn { background: none; border: none; color: #888; font-size: 1.6rem; cursor: pointer; }
        .close-btn:hover { color: #fff; }

        /* --- Form & Parameter Control Blocks --- */
        .form-group { margin-bottom: 16px; display: flex; flex-direction: column; gap: 6px; }
        .form-group label { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: #aaa; }
        .form-group input, .form-group select {
            background: #222;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            padding: 10px 14px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
        }

        .form-group input:focus { border-color: #ff9100; }
        .nested-row { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 10px; align-items: flex-end; }

        /* --- Session Telemetry Elements --- */
        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            background: rgba(255,255,255,0.02);
            padding: 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.03);
            margin-bottom: 16px;
        }

        .metric-item { display: flex; flex-direction: column; gap: 2px; }
        .metric-label { font-size: 0.65rem; color: #666; text-transform: uppercase; font-weight: 700; }
        .metric-value { font-size: 0.85rem; font-weight: 700; color: #ddd; word-break: break-all; }

        /* --- Dynamic Ledger / History Lists --- */
        .history-list-box {
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 10px;
            max-height: 120px;
            overflow-y: auto;
            margin-bottom: 15px;
            padding: 10px;
        }

        .history-item {
            font-size: 0.8rem;
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            color: #bbb;
            border-bottom: 1px solid rgba(255,255,255,0.02);
        }

        .summary-total-strip {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px dashed rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .total-label { font-size: 0.9rem; font-weight: 800; text-transform: uppercase; color: #ff9100; }
        .total-price { font-size: 1.4rem; font-weight: 800; color: #00ff66; }

        .action-button {
            width: 100%;
            background: linear-gradient(90deg, #ff6a00, #ff9100);
            border: none;
            border-radius: 10px;
            padding: 12px;
            color: white;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            margin-top: 10px;
        }

        .release-button { background: linear-gradient(90deg, #d32f2f, #f44336); }

        /* --- Settlement Invoice Layout View --- */
        .invoice-block { text-align: center; padding: 10px 0; }
        .invoice-line { display: flex; justify-content: space-between; margin: 10px 0; font-size: 0.9rem; border-bottom: 1px dashed #333; padding-bottom: 5px; }

        /* --- System Management Audit Logs Layout --- */
        .log-table-wrapper { width: 100%; overflow-x: auto; margin-top: 10px; }
        .log-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.8rem; }
        .log-table th { background: #222; color: #ff9100; padding: 10px; font-weight: 700; text-transform: uppercase; }
        .log-table td { padding: 10px; border-bottom: 1px solid #222; color: #ccc; }

        @media (max-width: 850px) {
            .main-content { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="dashboard-wrapper">
        <header class="header-panel">
            <div class="header-left">
                <div class="logo-placeholder">GZ</div>
                <h1 class="header-title">Wonder Gamezone</h1>
            </div>
            <button class="log-trigger-btn" onclick="openSystemLogsModal()">
                📊 System Audit Logs
            </button>
        </header>

        <main class="main-content">
            <div class="stations-side">
                <div>
                    <div class="section-title">In Use</div>
                    <div class="stations-grid" id="in-use-grid"></div>
                </div>
                <div>
                    <div class="section-title">Available</div>
                    <div class="stations-grid" id="available-grid"></div>
                </div>
            </div>

            <div class="members-side">
                <div class="members-panel">
                    <div class="members-title">Members</div>
                    <ul class="members-list" id="members-container"></ul>
                </div>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="modal-overlay" onclick="hideActiveModal(event)">
        <div class="modal-container" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2 id="modal-title-field">Control Terminal</h2>
                <button class="close-btn" onclick="closeTopModal()">&times;</button>
            </div>
            <div id="modal-injected-body"></div>
        </div>
    </div>

    <script>
        // System Config Variables 
        const HOURLY_RATE = 15.00;

        // Core Live Storage Matrices
        const stationsData = Array.from({ length: 9 }, (_, idx) => ({
            id: idx + 1,
            status: 'AVAILABLE',
            uid: '',
            timeRemaining: 0,
            durationMinutes: 0,
            startTime: '',
            endTime: '',
            playersCount: 1,
            foodHistory: [], // Structure array tracking historical item entries
            miscServiceFee: 0
        }));

        // System Transaction Ledger Architecture 
        const systemAuditLogs = [];

        const membersData = ["Member1 Name", "Member2 Name", "Member3 Name", "Member4 Name", "Member5 Name", "Member6 Name", "Member7 Name", "Member8 Name", "Member9 Name", "Member10 Name"];
        let targetedActiveStationId = null;

        // Formats seconds directly to time tokens
        function formatTime(totalSeconds) {
            const hrs = Math.floor(totalSeconds / 3600).toString().padStart(2, '0');
            const mins = Math.floor((totalSeconds % 3600) / 60).toString().padStart(2, '0');
            const secs = (totalSeconds % 60).toString().padStart(2, '0');
            return `${hrs}:${mins}:${secs}`;
        }

        // Returns dynamic critical timing status classes
        function getTimerColorClass(secondsLeft, totalDurationSeconds) {
            if (secondsLeft <= 0) return 'timer-critical';
            const executionPercentage = (secondsLeft / totalDurationSeconds);
            if (executionPercentage <= 0.20) return 'timer-critical'; // under 20% remaining
            if (executionPercentage <= 0.50) return 'timer-warning';  // under 50% remaining
            return 'timer-safe';
        }

        // Render Loop Core Engine
        function refreshDashboardVisuals() {
            const inUseGrid = document.getElementById('in-use-grid');
            const availableGrid = document.getElementById('available-grid');
            inUseGrid.innerHTML = '';
            availableGrid.innerHTML = '';

            stationsData.forEach(station => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => launchStationConsole(station.id);

                if (station.status === 'IN_USE') {
                    const colorStateClass = getTimerColorClass(station.timeRemaining, station.durationMinutes * 60);
                    card.innerHTML = `
                        <div class="card-number">${station.id}</div>
                        <div class="card-timer ${colorStateClass}" id="grid-timer-${station.id}">${formatTime(station.timeRemaining)}</div>
                    `;
                    inUseGrid.appendChild(card);
                } else {
                    card.innerHTML = `
                        <div class="card-number">${station.id}</div>
                        <div class="card-status">Available</div>
                    `;
                    availableGrid.appendChild(card);
                }
            });
        }

        // Dynamic Router: Launches active modal properties
        function launchStationConsole(stationId) {
            targetedActiveStationId = stationId;
            const station = stationsData.find(s => s.id === stationId);
            const titleField = document.getElementById('modal-title-field');
            const bodyField = document.getElementById('modal-injected-body');

            titleField.textContent = `Playstation ${station.id} Configurations`;

            if (station.status === 'AVAILABLE') {
                bodyField.innerHTML = `
                    <div class="form-group">
                        <label>Session Playing Duration (Minutes)</label>
                        <input type="number" id="setup-duration" min="1" value="60" required>
                    </div>
                    <div class="form-group">
                        <label>Occupancy Count (Persons)</label>
                        <select id="setup-players">
                            <option value="1">1 Person</option><option value="2">2 Persons</option>
                            <option value="3">3 Persons</option><option value="4">4 Persons</option>
                        </select>
                    </div>
                    <button class="action-button" onclick="commitNewSession()">Initialize Station</button>
                `;
            } else {
                renderActiveStationPanel(station);
            }
            document.getElementById('modal-overlay').classList.add('active');
        }

        // Compiles Active Control View Metrics and Add-on Trackers
        function renderActiveStationPanel(station) {
            const bodyField = document.getElementById('modal-injected-body');
            
            // Build out structural food log block markup lines
            let foodRowsHtml = station.foodHistory.length === 0 
                ? '<div class="history-item">No food items added yet.</div>'
                : station.foodHistory.map(f => `<div class="history-item"><span>${f.name} (x${f.qty})</span><span>$${(f.price * f.qty).toFixed(2)}</span></div>`).join('');

            bodyField.innerHTML = `
                <div class="metrics-grid">
                    <div class="metric-item"><div class="metric-label">Session Unique ID</div><div class="metric-value">${station.uid}</div></div>
                    <div class="metric-item"><div class="metric-label">Timeline Boundary</div><div class="metric-value">${station.startTime} - ${station.endTime}</div></div>
                    <div class="metric-item"><div class="metric-label">Remaining Countdown</div><div class="metric-value" id="modal-live-timer">${formatTime(station.timeRemaining)}</div></div>
                    <div class="metric-item"><div class="metric-label">Occupants</div><div class="metric-value">${station.playersCount} Person(s)</div></div>
                </div>

                <div class="form-group"><label>Food Order History Ledger</label><div class="history-list-box">${foodRowsHtml}</div></div>

                <div class="form-group nested-row">
                    <div>
                        <label>Add Catering Add-on</label>
                        <select id="catering-select">
                            <option value="none">-- Select Refreshment --</option>
                            <option value="Burger|7.00">Classic Burger ($7.00)</option>
                            <option value="Soda|3.00">Energy Soda ($3.00)</option>
                            <option value="Fries|5.00">Salted Fries ($5.00)</option>
                        </select>
                    </div>
                    <div>
                        <label>Quantity</label>
                        <input type="number" id="catering-qty" min="1" value="1">
                    </div>
                    <button class="action-button" style="margin:0; padding:10px;" onclick="appendFoodToSession()">Add</button>
                </div>

                <div class="form-group">
                    <label>Manual Misc Service Surcharge Fee ($)</label>
                    <input type="number" id="surcharge-fee" min="0" value="${station.miscServiceFee}" oninput="recalculateLivePanelBill()">
                </div>

                <div class="summary-total-strip">
                    <span class="total-label">Accrued Operational Balance:</span>
                    <span class="total-price" id="panel-bill-display">$0.00</span>
                </div>

                <button class="action-button" onclick="saveActivePanelState()">Save Station Changes</button>
                <button class="action-button release-button" onclick="processSessionSettlement()">End Session & Generate Invoice</button>
            `;
            recalculateLivePanelBill();
        }

        function closeTopModal() {
            document.getElementById('modal-overlay').classList.remove('active');
            targetedActiveStationId = null;
        }

        function hideActiveModal(e) { if (e.target.id === 'modal-overlay') closeTopModal(); }

        // Builds dynamic unique IDs based on your specific requirements
        function generateUniqueIdString(stationId, players) {
            const dateObj = new Date();
            const yyyy = dateObj.getFullYear();
            const mm = (dateObj.getMonth() + 1).toString().padStart(2, '0');
            const dd = dateObj.getDate().toString().padStart(2, '0');
            const hh = dateObj.getHours().toString().padStart(2, '0');
            const min = dateObj.getMinutes().toString().padStart(2, '0');
            
            return `ST${stationId}-${yyyy}${mm}${dd}-${hh}${min}-${players}P`;
        }

        // Activates Station Standby Slots
        function commitNewSession() {
            const station = stationsData.find(s => s.id === targetedActiveStationId);
            const duration = parseInt(document.getElementById('setup-duration').value) || 60;
            const players = parseInt(document.getElementById('setup-players').value);

            const now = new Date();
            const end = new Date(now.getTime() + duration * 60000);

            station.status = 'IN_USE';
            station.timeRemaining = duration * 60;
            station.durationMinutes = duration;
            station.playersCount = players;
            station.startTime = now.toTimeString().split(' ')[0].substring(0, 5);
            station.endTime = end.toTimeString().split(' ')[0].substring(0, 5);
            station.uid = generateUniqueIdString(station.id, players);
            
            // Clean dynamic history variables
            station.foodHistory = [];
            station.miscServiceFee = 0;

            refreshDashboardVisuals();
            closeTopModal();
        }

        // Adds food items to history without clearing previous counts
        function appendFoodToSession() {
            const station = stationsData.find(s => s.id === targetedActiveStationId);
            const menuSelection = document.getElementById('catering-select').value;
            const quantity = parseInt(document.getElementById('catering-qty').value) || 0;

            if (menuSelection === 'none' || quantity <= 0) return;

            const [itemName, itemCostStr] = menuSelection.split('|');
            const baseCost = parseFloat(itemCostStr);

            // If the item has already been added, increment its quantity; otherwise, create a new row
            const matchingFoodItem = station.foodHistory.find(f => f.name === itemName);
            if (matchingFoodItem) {
                matchingFoodItem.qty += quantity;
            } else {
                station.foodHistory.push({ name: itemName, price: baseCost, qty: quantity });
            }

            renderActiveStationPanel(station);
        }

        function saveActivePanelState() {
            const station = stationsData.find(s => s.id === targetedActiveStationId);
            const surchargeField = document.getElementById('surcharge-fee');
            if (surchargeField) {
                station.miscServiceFee = parseFloat(surchargeField.value) || 0;
            }
            closeTopModal();
        }

        // Computes financial balance sheets in real-time
        function calculateTotalBalanceSheet(station) {
            const structuralPlayCost = (station.durationMinutes / 60) * HOURLY_RATE;
            const cateringCostTotal = station.foodHistory.reduce((sum, item) => sum + (item.price * item.qty), 0);
            const manualFees = parseFloat(station.miscServiceFee) || 0;
            
            return {
                playCost: structuralPlayCost,
                foodCost: cateringCostTotal,
                miscCost: manualFees,
                grandTotal: structuralPlayCost + cateringCostTotal + manualFees
            };
        }

        function recalculateLivePanelBill() {
            if (!targetedActiveStationId) return;
            const station = stationsData.find(s => s.id === targetedActiveStationId);
            const surchargeField = document.getElementById('surcharge-fee');
            
            let tempMisc = station.miscServiceFee;
            if(surchargeField) tempMisc = parseFloat(surchargeField.value) || 0;

            const baseCost = (station.durationMinutes / 60) * HOURLY_RATE;
            const foodCost = station.foodHistory.reduce((sum, f) => sum + (f.price * f.qty), 0);
            
            document.getElementById('panel-bill-display').textContent = `$${(baseCost + foodCost + tempMisc).toFixed(2)}`;
        }

        // Displays final billing details upon session ending
        function processSessionSettlement() {
            const station = stationsData.find(s => s.id === targetedActiveStationId);
            const finalSurchargeField = document.getElementById('surcharge-fee');
            if (finalSurchargeField) {
                station.miscServiceFee = parseFloat(finalSurchargeField.value) || 0;
            }

            const statements = calculateTotalBalanceSheet(station);

            // Format dynamic food item breakdown for the invoice display
            let foodBreakdownText = station.foodHistory.length === 0
                ? 'None'
                : station.foodHistory.map(f => `${f.name} (x${f.qty})`).join(', ');

            // Commit record to internal audit log ledger
            const completedLogEntry = {
                uid: station.uid,
                stationId: station.id,
                duration: station.durationMinutes,
                players: station.playersCount,
                foodDetails: foodBreakdownText,
                totalCollected: statements.grandTotal.toFixed(2),
                timestamp: new Date().toLocaleTimeString().substring(0, 5)
            };
            systemAuditLogs.push(completedLogEntry);

            // Re-render modal to show the final receipt invoice layout view
            const titleField = document.getElementById('modal-title-field');
            const bodyField = document.getElementById('modal-injected-body');

            titleField.textContent = `Station ${station.id} Final Settlement`;
            bodyField.innerHTML = `
                <div class="invoice-block">
                    <p style="color:#888; font-size:0.75rem; margin-bottom:15px;">INVOICE ID: ${station.uid}</p>
                    <div class="invoice-line"><span>Console Usage Fee (${station.durationMinutes} Mins)</span><span>$${statements.playCost.toFixed(2)}</span></div>
                    <div class="invoice-line"><span>Catering Order Fees</span><span>$${statements.foodCost.toFixed(2)}</span></div>
                    <div class="invoice-line"><span>Miscellaneous Service Fees</span><span>$${statements.miscCost.toFixed(2)}</span></div>
                    <div class="summary-total-strip" style="margin-bottom:20px;">
                        <span class="total-label">Total Amount Paid:</span>
                        <span class="total-price" style="font-size:1.8rem;">$${statements.grandTotal.toFixed(2)}</span>
                    </div>
                    <button class="action-button" onclick="flushStationSlot(${station.id})">Clear Console & Complete Order</button>
                </div>
            `;
        }

        function flushStationSlot(stationId) {
            const station = stationsData.find(s => s.id === stationId);
            station.status = 'AVAILABLE';
            station.timeRemaining = 0;
            station.uid = '';
            station.foodHistory = [];
            station.miscServiceFee = 0;

            refreshDashboardVisuals();
            closeTopModal();
        }

        // Renders the historical records system log panel view
        function openSystemLogsModal() {
            targetedActiveStationId = null; // Detach active hooks
            const titleField = document.getElementById('modal-title-field');
            const bodyField = document.getElementById('modal-injected-body');

            titleField.textContent = "System Transaction Logs";

            if (systemAuditLogs.length === 0) {
                bodyField.innerHTML = `<p style="text-align:center; padding:30px; color:#666;">No historical session entries found in this runtime environment.</p>`;
            } else {
                let logRowsHtml = systemAuditLogs.map(log => `
                    <tr>
                        <td>${log.uid}</td>
                        <td>P${log.stationId}</td>
                        <td>${log.duration}m</td>
                        <td>${log.players}</td>
                        <td style="max-width:120px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;" title="${log.foodDetails}">${log.foodDetails}</td>
                        <td style="color:#00ff66; font-weight:700;">$${log.totalCollected}</td>
                    </tr>
                `).join('');

                bodyField.innerHTML = `
                    <div class="log-table-wrapper">
                        <table class="log-table">
                            <thead>
                                <tr>
                                    <th>Session ID</th>
                                    <th>Stn</th>
                                    <th>Time</th>
                                    <th>Pax</th>
                                    <th>Items Ordered</th>
                                    <th>Total</th>
                                </tr>
                            </thead>
                            <tbody>${logRowsHtml}</tbody>
                        </table>
                    </div>
                `;
            }
            document.getElementById('modal-overlay').classList.add('active');
        }

        // Global Loop Engine
        setInterval(() => {
            stationsData.forEach(station => {
                if (station.status === 'IN_USE' && station.timeRemaining > 0) {
                    station.timeRemaining--;

                    // Real-time grid interface injection updates
                    const gridTimer = document.getElementById(`grid-timer-${station.id}`);
                    if (gridTimer) {
                        gridTimer.textContent = formatTime(station.timeRemaining);
                        
                        // Update color dynamically based on threshold checks
                        gridTimer.className = `card-timer ${getTimerColorClass(station.timeRemaining, station.durationMinutes * 60)}`;
                    }

                    // Active open panel runtime text synchronization updates
                    if (targetedActiveStationId === station.id) {
                        const modalTimer = document.getElementById('modal-live-timer');
                        if (modalTimer) modalTimer.textContent = formatTime(station.timeRemaining);
                    }
                } else if (station.status === 'IN_USE' && station.timeRemaining <= 0) {
                    // System naturally lapsed -> Automatically force processing settlement invoice view layout
                    if (targetedActiveStationId === station.id) {
                        processSessionSettlement();
                    } else {
                        // Silent auto logs generation loop fallback sequence for closed panels
                        const statements = calculateTotalBalanceSheet(station);
                        let foodDetails = station.foodHistory.length === 0 ? 'None' : station.foodHistory.map(f => `${f.name} (x${f.qty})`).join(', ');
                        systemAuditLogs.push({
                            uid: station.uid, stationId: station.id, duration: station.durationMinutes, players: station.playersCount,
                            foodDetails: foodDetails, totalCollected: statements.grandTotal.toFixed(2), timestamp: new Date().toLocaleTimeString().substring(0, 5)
                        });
                        station.status = 'AVAILABLE';
                        station.uid = '';
                        station.foodHistory = [];
                        station.miscServiceFee = 0;
                        refreshDashboardVisuals();
                    }
                }
            });
        }, 1000);

        // Core Init Routines
        document.getElementById('members-container').innerHTML = membersData.map(name => `<li class="member-item">${name}</li>`).join('');
        refreshDashboardVisuals();
    </script>
</body>
</html>
